<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <style>
        .box1 {
            border: solid black;
            background-color: #16c11e;
            padding: 30px;
            box-shadow: 15px 10px 10px 5px #39ba66;
        }
        p{
            text-shadow: 15px 10px 5px #39ba66;
            font-size: 50px;
            outline: 2px solid black;
            border-radius: 20px;
            outline-offset: 40px ;
        }
    </style>
</head>
<body>
    <div class="box1">
        i am a box
    </div>
    <br><br>
    <p>text shadow</p>
</body>
</html>
