<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>box model</title>
    <style>
        .box1{
            background-color: rgb(100, 150, 25);
            padding: 20px;
            margin: 60px;
            text-align: center;
            border: solid rgb(6, 20, 6);

        }
        .box2{
            padding: 20px;
            margin: 40px;
            border: solid blue;
            background-color: rgb(143, 231, 20);
            height: 100px;
            box-sizing: border-box;

        }
        *{
            margin: 0;
            padding: 0;
        }
    </style>
</head>
<body>
    <div class="box1">This is a div.</div>
    <div class="box2">box 2</div>
    
</body>
</html>
