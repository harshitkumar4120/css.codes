<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>position</title>
    <style>
        *{
            margin: 0;
            padding: 0;
        }
        .box{
            width: 70vw;
            height: 250;
            margin: 15px;
            padding: 4px;
            border: solid black;
            text-align: center;
            text-transform: capitalize;\
            text-decoration: underline;
            text-decoration-color: rgb(150, 15, 15);
            text-decoration-thickness: 5px;
                        height: 200px;

        }
        .box1{
            background-color: orange;
            position: sticky;
            top:40px;
            /* left:30px; */
        }
        .box2{
            background-color: orangered;
            position:relative;
            /* bottom: 10px;/ */
            /* height: 40px; */
        }
        .box3{
            background-color: aqua;
            /* position: sticky; */
            top: 20px;

        }
        .box4{
            background-color: yellowgreen;
        }
        .box5{
            background-color: chartreuse;
        }
        .parent{
            margin: 40px; 
            padding: 15px;
            border: solid blue;
        }
    </style>
</head>
<body>
    <div class="parent">
    <div class="box box1">harsh</div>
    <div class="box box2">annu</div>
    <div class="box box3">naina</div>
    <div class="box box4">agrima</div>
    <div class="box box5">vikash</div>
    </div>
</body>
</html>
